id: "camera-frame-search"
name: "基于特征查找摄像头图像帧"
description: "根据场景描述或地点搜索摄像头，并通过视频预处理及特征检索查找相关的图像帧，最后出图展示。"
default_run_mode: manual

final_output_schema:
  type: object
  properties:
    title: { type: string, description: "最终报告的标题" }
    frame_results_path:
      type: string
      description: "frame-search 阶段写入的完整检索结果 JSON 文件路径（自动从 frame-search 传入）"
    visual_report_path: { type: string, description: "生成的可视化报告 PNG 绝对路径" }
    summary: { type: string, description: "执行结果的总结描述" }
    frame_results:
      type: array
      description: "仅包含命中帧的摄像头结果列表（跳过无命中摄像头），由 frame-search 过滤后输出"
      items:
        type: object
        properties:
          camera_id: { type: string, description: "摄像头 ID" }
          camera_name: { type: string, description: "摄像头名称" }
          location: { type: string, description: "行政区划位置" }
          latitude: { type: number }
          longitude: { type: number }
          frames:
            type: array
            items:
              type: object
              properties:
                image_url: { type: string, description: "图像帧 URL" }
                timestamp: { type: integer, description: "帧时间戳 (ms)" }
                features:
                  type: array
                  items:
                    type: object
                    properties:
                      feature_bbox:
                        type: array
                        items: { type: number }
                        description: "边界框坐标 [x1, y1, x2, y2]"
                      feature_name: { type: string, description: "特征名称" }
  required: [title, frame_results_path, visual_report_path]
  upstream_from:
    frame_results_path: frame-search
    frame_results: frame-search

triggers:
  - type: command
    pattern: "执行相机特征检索"
  - type: context
    conditions: ["特征", "查找摄像头", "图像帧", "行驶轨迹", "车辆轨迹", "追踪车辆", "查找车辆"]

subtasks:
  - id: "camera-search"
    name: "摄像头搜索"
    description: "根据特征描述或地点搜索相关的候选摄像头列表。"
    agent_profile: "camera-searcher"
    input_schema:
      type: object
      oneOf:
        - title: "语义搜索 (向量检索)"
          description: "基于自然语言描述进行摄像头的向量相似度搜索"
          properties:
            query:
              type: string
              description: "跟地理位置相关的自然语言描述或道路/街道名，如'园区东门摄像头'、'衡州大道'、'世纪大道沿线'"
            limit:
              type: integer
              description: "返回数量，如果没有明确指定，默认返回20个"
              default: 20
          required: [query]
        - title: "POI 范围检索"
          description: "基于某个具体地点名称或实体名称，检索附近、周边或具体半径范围内（如'附近5km'）的空间。"
          properties:
            keyword:
              type: string
              description: "具体的 POI/地标/门牌地址，如'环球贸易中心'、'朝阳区大悦城'、'西三环北路27号'、'首都机场T3航站楼'"
            radius_m:
              type: number
              description: "检索半径（米）"
              default: 1000
            region:
              type: string
              description: "可选的行政区划限制（仅限省/市/区/县级），如'浦东新区'、'海淀区'、'杭州市'；道路、街道、地标、门牌均不属于 region，请用 keyword"
            types:
              type: string
              description: "POI 类型限制"
            limit:
              type: integer
              description: "返回数量"
              default: 20
          required: [keyword]

  - id: "frame-search"
    name: "摄像头处理和检索"
    description: "对选定的摄像头创建预处理任务截取帧，查询任务状态，并执行图像帧的特征检索。"
    agent_profile: "frame-searcher"
    input_schema:
      type: object
      properties:
        camera_ids:
          type: array
          items: { type: string }
          description: "从上一步获取的摄像头 ID 列表"
        start_time:
          type: string
          description: "截帧开始时间 (ISO8601格式)，与 end_time 的间隔不能超过 1 天"
        end_time:
          type: string
          description: "截帧结束时间 (ISO8601格式)，与 start_time 的间隔不能超过 1 天"
        feature_text:
          type: string
          description: "要在帧中检索的自然语言特征描述，如'黄色小汽车|骑摩托车的人'。agent 调用脚本时需翻译为英文 features"
      required: [camera_ids, start_time, end_time, feature_text]
      upstream: [camera_ids]

  - id: "result-visualize"
    name: "检索结果画图"
    description: "调用 gen-image skill 把 frame_results 渲染为 PNG 图表"
    agent_profile: "result-visualizer"
    input_schema:
      type: object
      properties:
        frame_results_path:
          type: string
          description: "上游 frame-search 写入的 frame_results JSON 文件路径（如 /tmp/seeagent_frame_results_latest.json）"
        frame_results:
          type: array
          description: "frame-search 输出的完整检索结果（仅含命中帧的摄像头，跳过无命中条目）"
          items:
            type: object
            properties:
              camera_id: { type: string }
              camera_name: { type: string }
              location: { type: string }
              latitude: { type: number }
              longitude: { type: number }
              frames:
                type: array
                items:
                  type: object
                  properties:
                    image_url: { type: string }
                    timestamp: { type: integer }
                    features:
                      type: array
                      items:
                        type: object
                        properties:
                          feature_bbox: { type: array, items: { type: number } }
                          feature_name: { type: string }
      required: [frame_results_path]
      upstream: [frame_results_path, frame_results]
