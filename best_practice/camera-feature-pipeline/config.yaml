id: "camera-feature-pipeline"
name: "相机特征检索出图"
description: "从相机搜索到预处理检索再到表格图片生成的三阶段流程"
default_run_mode: manual

final_output_schema:
  type: object
  properties:
    title: { type: string }
    camera_candidates:
      type: array
      items: { type: object }
    feature_result: { type: object }
    table_image_path: { type: string }
    summary: { type: string }
  required: [title, feature_result, table_image_path]

triggers:
  - type: command
    pattern: "执行相机特征检索出图"
  - type: context
    conditions: ["相机", "预处理", "特征检索", "表格图片"]

subtasks:
  - id: "camera-search"
    name: "相机搜索"
    description: "根据用户场景描述搜索候选相机"
    agent_profile: "camera-locator"
    input_schema:
      type: object
      oneOf:
        - title: "精确地点检索"
          description: "基于具体的地点名称进行检索，如'园区东门早上的摄像头'"
          properties:
            location:
              type: string
              description: "精确地点名，如'园区东门'"
            time_range:
              type: string
              description: "时间范围，格式为 '开始时间, 结束时间'。早上可用 06:00:00, 08:00:00，默认为最近两小时。示例: '2026-04-03:06:00:00, 2026-04-03:08:00:00'"
          required: [location, time_range]
        - title: "周边范围检索"
          description: "基于某地点的周边距离范围进行检索，如'某某大厦附近5km'"
          properties:
            center:
              type: string
              description: "中心地点，如'某某大厦'"
            radius:
              type: string
              description: "检索距离，如'5km'，未提供则默认为'1km'"
            time_range:
              type: string
              description: "时间范围，格式为 '开始时间, 结束时间'。早上可用 06:00:00, 08:00:00，默认为最近两小时。示例: '2026-04-03:06:00:00, 2026-04-03:08:00:00'"
          required: [center, radius, time_range]

  - id: "feature-extraction"
    name: "特征检索"
    description: "对指定相机创建预处理任务，轮询完成后执行文本特征检索"
    agent_profile: "feature-extractor"
    input_schema:
      type: object
      properties:
        camera_ids:
          type: array
          items: { type: string }
          description: "要处理的相机ID列表"
        feature_text:
          type: string
          description: "文本特征描述"
      required: [camera_ids, feature_text]
      upstream: [camera_ids]

  - id: "render-image"
    name: "结果出图"
    description: "将特征检索结果渲染为带图片缩略图的表格 PNG"
    agent_profile: "result-visualizer"
    input_schema:
      type: object
      properties:
        feature_result:
          type: object
          description: "特征检索阶段输出的完整JSON对象"
        output_image_path:
          type: string
          description: "输出图片路径"
      required: [feature_result]
      upstream: [feature_result]
